<div class="form-pane">

  <div class="form-eyebrow">Acceso</div>
  <h1 class="form-title">Iniciar sesión</h1>
  <p class="form-subtitle">Ingresa tus credenciales para continuar en PixPro.</p>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

    <div class="glass-field">
      <label for="login-email">Correo electrónico</label>
      <input
        id="login-email"
        class="glass-input"
        type="email"
        formControlName="email"
        placeholder="tu@email.com"
        autocomplete="email"
      />
      <span class="field-error" *ngIf="emailControl.touched && emailControl.invalid">
        {{ emailError }}
      </span>
    </div>

    <div class="glass-field">
      <label for="login-password">Contraseña</label>
      <input
        id="login-password"
        class="glass-input"
        type="password"
        formControlName="password"
        placeholder="••••••••"
        autocomplete="current-password"
        required
      />
      <span class="field-error" *ngIf="passwordControl.touched && passwordControl.invalid">
        {{ passwordError }}
      </span>
    </div>

    <button
      type="submit"
      class="glass-btn btn-login"
      [disabled]="loginForm.invalid || isLoading()"
      aria-label="Iniciar sesión"
    >
      <span class="spinner" *ngIf="isLoading()"></span>
      <span>{{ isLoading() ? 'Verificando...' : 'Iniciar sesión' }}</span>
    </button>

  </form>

  <div class="form-divider"><span>o</span></div>

  <div class="form-switch">
    ¿No tienes cuenta?
    <a routerLink="/register">Regístrate gratis</a>
  </div>

</div>
